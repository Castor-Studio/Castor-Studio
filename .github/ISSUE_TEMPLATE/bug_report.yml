name: 🐛 Bug Report
description: Report a bug through reproducible steps
title: "bug(scope): [short description]"
labels:
  - type:bug

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please provide as much information as possible to help us reproduce and fix the issue.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe the issue.
      placeholder: The AI switches to the wrong scene during a live event.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Start a live session
        2. Enable Auto Mode
        3. Switch to Scene A
        4. Observe the behavior
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Low
        - Medium
        - High
        - Critical
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - AI
        - Audio
        - Video
        - Streaming
        - Recording
        - Scene Management
        - User Interface
        - Infrastructure
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Application Version
      placeholder: v0.4.2

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Messages
      description: Paste relevant logs, stack traces or console output.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, videos, configuration, etc.
